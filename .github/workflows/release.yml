name: Release Module

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build-release:
    name: Build Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure CMake (Release)
        run: cmake -B build_release -DCMAKE_BUILD_TYPE=Release

      - name: Build Project (Release)
        run: cmake --build build_release --config Release --parallel

      - name: Tar binary (Unix)
        if: runner.os != 'Windows'
        run: tar -czvf photo-converter-${{ matrix.os }}.tar.gz -C build_release/src yash

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ matrix.os }}
          path: yash-*.*
          retention-days: 1

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-artifacts-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body_path: .github/RELEASE_NOTES.md
