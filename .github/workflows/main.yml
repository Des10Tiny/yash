name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-debug:
    name: Build Debug on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure CMake (Debug)
        run: cmake -B build_debug -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON

      - name: Build Project
        run: cmake --build build_debug --config Debug --parallel

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: test-binaries-${{ matrix.os }}
          path: build_debug/
          retention-days: 1

  call-tests:
    needs: build-debug
    uses: ./.github/workflows/tests.yml

  call-release:
    needs: call-tests
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    secrets: inherit
